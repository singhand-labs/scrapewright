apiVersion: apps/v1
kind: Deployment
metadata:
  name: scrapewright
  labels:
    app: scrapewright
spec:
  replicas: 5
  selector:
    matchLabels:
      app: scrapewright
  template:
    metadata:
      labels:
        app: scrapewright
    spec:
      containers:
      - name: scrapewright
        image: scrapewright:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: SCRAPEWRIGHT_API_KEY
          valueFrom:
            secretKeyRef:
              name: scrapewright-secrets
              key: api-key
              optional: true
        ports:
        - containerPort: 8765
        resources:
          requests:
            memory: "1.5Gi"
            cpu: "1"
          limits:
            memory: "2Gi"
            cpu: "2"
        livenessProbe:
          httpGet:
            path: /health
            port: 8765
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8765
          initialDelaySeconds: 15
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: scrapewright
spec:
  type: ClusterIP
  ports:
  - port: 8765
    targetPort: 8765
  selector:
    app: scrapewright
